<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GADA GROUP</title>
<style>
  body { font-family: 'Heebo', sans-serif; background:#0f1117; color:#f0f2ff; margin:0; }
  .header { background:#1a1d27; padding:20px; text-align:center; border-bottom:3px solid #f0a500; }
  .card { background:#1a1d27; border-radius:12px; padding:20px; margin:15px 0; border:1px solid #2e334d; }
  .btn { width:100%; padding:18px; background:#f0a500; color:#000; border:none; border-radius:10px; font-size:18px; font-weight:700; margin-top:20px; }
  select, textarea { width:100%; padding:16px; border-radius:10px; background:#22263a; color:white; margin-bottom:15px; }
</style>
</head>
<body>

<div class="header">
  <h1>GADA GROUP</h1>
  <p>מערכת הפצה • סטס זולין ©</p>
</div>

<div style="padding:20px">
  <h2>יצירת הזמנה (סוכן)</h2>
  <select id="branch">
    <option value="">בחר סניף...</option>
    <option>מקס סטוק - אילת</option>
    <option>מקס סטוק - אשדוד</option>
    <option>מקס סטוק - באר שבע</option>
    <option>זול סטוק - באר שבע</option>
    <option>ביג סטוק - חולון</option>
  </select>
  <textarea id="notes" placeholder="הערות..." rows="4"></textarea>
  <button onclick="sendOrder()" class="btn">שלח הזמנה</button>

  <h2 style="margin-top:40px">ליקוט (מלקט)</h2>
  <div id="orders"></div>
</div>

<script>
let orders = JSON.parse(localStorage.getItem('gada_orders')) || [];

function saveOrders() {
  localStorage.setItem('gada_orders', JSON.stringify(orders));
}

function sendOrder() {
  const branch = document.getElementById('branch').value;
  if (!branch) return alert("בחר סניף");
  const notes = document.getElementById('notes').value || '';
  
  const order = {
    id: Date.now(),
    branch: branch,
    notes: notes,
    status: 'חדש',
    time: new Date().toLocaleTimeString('he-IL')
  };
  
  orders.unshift(order);
  saveOrders();
  renderOrders();
  alert(`✅ הזמנה נשלחה!\nסניף: ${branch}`);
}

function renderOrders() {
  const div = document.getElementById('orders');
  div.innerHTML = orders.map(o => `
    <div class="card">
      <strong>${o.branch}</strong><br>
      <small>${o.time}</small><br>
      ${o.notes ? `<small style="color:#f0a500">הערה: ${o.notes}</small>` : ''}
      <button onclick="complete(${o.id})" style="margin-top:10px;padding:10px 20px;background:#22c55e;color:black;border:none;border-radius:8px">סיים ליקוט</button>
    </div>
  `).join('');
}

function complete(id) {
  const order = orders.find(o => o.id === id);
  if (order) {
    const pallets = prompt("כמה משטחים?", "8");
    if (pallets) {
      order.pallets = pallets;
      order.status = 'לוקט';
      saveOrders();
      renderOrders();
      alert(`ליקוט הושלם! ${pallets} משטחים`);
    }
  }
}

// Start
renderOrders();
</script>
</body>
</html>
